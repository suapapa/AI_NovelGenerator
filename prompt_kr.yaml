summarize_recent_chapters_prompt: |
  당신은 소설 편집자입니다. 이미 쓴 직전 3장과 이번 장 정보를 보고, 이번 장 요약을 만드세요.
  직전 3장:
  {combined_text}

  이번 장 정보:
  제{novel_number}장 《{chapter_title}》:
  ├── 이번 장 역할: {chapter_role}
  ├── 핵심 기능: {chapter_purpose}
  ├── 서스펜스: {suspense_level}
  ├── 복선: {foreshadowing}
  ├── 반전: {plot_twist_level}
  └── 장 요약: {chapter_summary}

  다음 장 정보:
  제{next_chapter_number}장 《{next_chapter_title}》:
  ├── 이번 장 역할: {next_chapter_role}
  ├── 핵심 기능: {next_chapter_purpose}
  ├── 서스펜스: {next_chapter_suspense_level}
  ├── 복선: {next_chapter_foreshadowing}
  ├── 반전: {next_chapter_plot_twist_level}
  └── 장 요약: {next_chapter_summary}

  **맥락 정리**:
  1. 직전 3장에서 짚을 것:
     - 1장: [장 제목]→[충돌/주제]→[중요 인물·개념]
     - 2장: [이미 잡힌 관계]→[플롯 진행]→[남은 복선]
     - 3장: [새로 생긴 변수]→[세계관 확장]→[미해결]
  2. 이어갈 요소:
     - 반드시 이어갈 설정 3개
     - 바꿔도 되는 보조 설정 2개

  **요약 작성 규칙**:
  1. 비중:
     - 대부분은 직전 3장에서 논리적으로 한 걸음 나아간 내용
     - 새 요소를 넣을 때는 종류를 밝힐 것(예: 기술 돌파, 인물 타락)
  2. 구조:
     - "이어가기 → 진행 → 다음 복선" 순서로
     - 단락마다 앞 내용과의 연결 한 곳 + 새 진전 한 곳
  3. 주의:
     - 직전 3장 설정과 어긋나면 [!]로 표시하고 이유 적기
     - 열려 있는 줄기는 그럴듯한 방향 두 가지 제시

  최대 800자로 「현재 장 요약」을 쓰세요.

  아래 형식으로만 출력하세요. 설명은 붙이지 마세요.
  현재 장 요약: <여기에 현재 장 요약>
knowledge_search_prompt: |
  아래 집필 요구에 맞춰 지식 베이스 검색어를 만드세요.

  장 정보:
  - 집필 예정: 제{chapter_number}장
  - 장 제목: {chapter_title}
  - 주요 인물: {characters_involved}
  - 주요 소품: {key_items}
  - 장면 장소: {scene_location}

  집필 목표:
  - 이번 장 역할: {chapter_role}
  - 핵심 기능: {chapter_purpose}
  - 복선: {foreshadowing}

  현재 요약:
  {short_summary}

  - 사용자 가이드:
  {user_guidance}

  - 주요 인물(없을 수 있음): {characters_involved}
  - 주요 소품(없을 수 있음): {key_items}
  - 장면 장소(없을 수 있음): {scene_location}
  - 시간 압박(없을 수 있음): {time_constraint}

  생성 규칙:

  1. 키워드 조합:
  - 유형1: [대상]+[속성](예: "양자 컴퓨터 고장 로그")
  - 유형2: [사건]+[결과](예: "연구소 폭발 방사선 유출")
  - 유형3: [장소]+[특징](예: "지하도시 산소 순환 시스템")

  2. 우선순위:
  - 1순위: 사용자 가이드에 나온 말
  - 2순위: 이번 장의 소품·장소
  - 3순위: 연관될 수 있는 주변 개념

  3. 걸러내기:
  - 너무 추상적인 말은 빼기
  - 직전 3장에서 이미 많이 쓴 말도 빼기

  검색어 3~5줄을 중요도 높은 것부터 쓰세요.
  형식: 한 줄에 키워드 2~3개를 "·"로 잇기

  예시:
  IT 회사·데이터 유출
  지하 연구소·유전자 편집·금기 실험
knowledge_filter_prompt: |
  지식 베이스에서 가져온 내용을 세 단계로 걸러내세요.

  걸러낼 내용:
  {retrieved_texts}

  지금 서사에 필요한 것:
  {chapter_info}

  절차:

  1. 충돌 잡기:
  - 기존 요약과 거의 같은 내용은 삭제
  - 세계관과 어긋나는 내용은 ▲ 접두사로 표시

  2. 쓸 만한지 보기:
  중요(❗):
  · 새 인물 관계가 열릴 여지
  · 은유로 쓸 수 있는 소재
  · 장면을 구체화할 디테일이 둘 이상

  보조(·):
  · 환경 묘사 보강
  · 기술·절차 설명

  3. 다시 묶기:
  "플롯 재료 / 인물 / 세계 / 작법"으로 나누고
  어디에 쓸지 한 줄 힌트를 붙이세요(예: "시간 압박형 서스펜스에 사용")

  출력 형식:
  [분류명]→[적용 장면]
  ❗/· [내용] (▲충돌 힌트)

  예시:
  [플롯 재료]→시간 압박형 서스펜스에 사용
  ❗ 지하 산소 잔량 23%(생존 위기 연출 가능)
  ▲ 3장 "영구 생태 순환 시스템"과 설정 충돌

  결과 텍스트만 출력하세요. 설명은 붙이지 마세요.
core_seed_prompt: |
  "눈송이 작법" 1단계로 이야기 핵을 잡으세요.
  주제: {topic}
  장르: {genre}
  분량: 약 {number_of_chapters}장(장당 {word_number}자)

  한 문장으로 이야기 본질을 쓰세요. 예:
  "[주인공]이 [핵심 사건]을 당했을 때, [결정적 행동]을 해야 하며 그렇지 않으면 [재앙]이 온다. 그 사이 [숨은 더 큰 위기]도 익고 있다."

  요구:
  1. 겉으로 보이는 충돌과 숨은 위기를 둘 다 넣을 것
  2. 인물이 움직이는 이유를 드러낼 것
  3. 세계관의 근본 모순을 암시할 것
  4. 25~100자

  이야기 핵만 반환하세요. 설명은 붙이지 마세요.
character_dynamics_prompt: |
  다음을 바탕으로:
  - 내용 가이드: {user_guidance}
  - 이야기 핵: {core_seed}

  변할 여지가 큰 주요 인물 3~6명을 설계하세요. 각자 아래를 포함하세요.

  기본:
  - 배경, 외모, 성별, 나이, 직업 등
  - 숨긴 비밀이나 약점(세계관·다른 인물과 연결되어도 됨)

  동력:
  - 겉으로 쫓는 것(물질적 목표)
  - 속으로는 바라는 것(감정적 욕구)
  - 더 깊은 필요(철학적 층위)

  아크:
  초기 상태 → 촉발 사건 → 인지 부조화 → 변혁 고비 → 최종 상태

  관계:
  - 다른 인물과의 관계·대립
  - 최소 두 명과의 가치관 충돌
  - 협력 유대 하나
  - 배신 가능성 하나

  결과 텍스트만 주세요. 설명은 붙이지 마세요.
world_building_prompt: |
  다음을 바탕으로:
  - 내용 가이드: {user_guidance}
  - 핵심 충돌: "{core_seed}"

  이야기를 버틸 세계관을 세 층으로 잡으세요.

  1. 물리:
  - 공간(지리×사회적 위치)
  - 시간(주요 역사 사건)
  - 법칙(물리/마법/사회 규칙의 허점)

  2. 사회:
  - 권력의 균열(계층·종족·조직 모순)
  - 문화 금기(깨졌을 때의 대가)
  - 경제 구조(무엇을 두고 다투는지)

  3. 은유:
  - 작품 전체에 반복되는 이미지·기호
  - 기후·환경이 심리와 맞물리는 방식
  - 건축·풍경이 암시하는 문명의 곤경

  요구:
  각 층마다 인물 결정과 맞물리는 동적 요소를 최소 3개 넣으세요.
  결과 텍스트만 주세요. 설명은 붙이지 마세요.
plot_architecture_prompt: |
  다음을 바탕으로:
  - 내용 가이드: {user_guidance}
  - 이야기 핵: {core_seed}
  - 인물 체계: {character_dynamics}
  - 세계관: {world_building}

  아래 구조로 설계하세요.

  1막(촉발)
  - 일상 속 이상 징후(복선 3곳)
  - 도입: 주선·암선·부선의 시작
  - 촉매: 균형을 깨는 사건(인물 관계 최소 3명 변동)
  - 잘못된 선택: 주인공의 한계에서 나온 오판

  2막(대항)
  - 고조: 주선과 부선이 맞물리는 지점
  - 이중 압박: 바깥 장애 + 속 좌절
  - 거짓 승리: 끝난 듯 보이지만 위기를 키우는 전환
  - 암흑: 세계관을 다시 보는 순간

  3막(해결)
  - 대가: 위기를 막기 위해 넘겨야 할 가치
  - 겹친 전환: 최소 세 겹(표면 해결→새 위기→마지막 선택)
  - 여파: 열린 서스펜스 두 개

  단계마다 전환점 셋과, 그에 맞는 복선 회수 방법을 넣으세요.
  결과 텍스트만 주세요. 설명은 붙이지 마세요.
chapter_blueprint_prompt: |
  다음을 바탕으로:
  - 내용 가이드: {user_guidance}
  - 소설 구조:
  {novel_architecture}

  {number_of_chapters}장의 리듬을 설계하세요.

  1. 장 묶음:
  - 3~5장마다 하나의 서스펜스 유닛, 소클라이맥스 포함
  - 유닛 사이에는 긴장 2장 → 완충 1장
  - 큰 전환 장에는 다시점 복선 여유를 둘 것

  2. 각 장에 적을 것:
  - 이번 장 역할(인물/사건/주제 등)
  - 서스펜스 유형(정보 비대칭/도덕 딜레마/시간 압박 등)
  - 감정 톤 이동(예: 의심→공포→결단)
  - 복선(매설/강화/회수)
  - 반전 강도(1~5단계)

  출력 형식 예시:
  제n장 - [제목]
  이번 장 역할: [인물/사건/주제/...]
  핵심 기능: [추진/전환/폭로/...]
  서스펜스: [촘촘/점진/폭발/...]
  복선: 매설(A실마리)→강화(B모순)...
  반전: ★☆☆☆☆
  장 요약: [한 문장]

  제n+1장 - [제목]
  이번 장 역할: [인물/사건/주제/...]
  핵심 기능: [추진/전환/폭로/...]
  서스펜스: [촘촘/점진/폭발/...]
  복선: 매설(A실마리)→강화(B모순)...
  반전: ★☆☆☆☆
  장 요약: [한 문장]

  요구:
  - 장당 설명은 100자 이내로 짧게
  - 긴장 곡선이 전체에서 자연스럽게 이어지게
  - {number_of_chapters}장을 다 쓰기 전에는 결말 장을 넣지 말 것

  결과 텍스트만 주세요. 설명은 붙이지 마세요.
chunked_chapter_blueprint_prompt: |
  다음을 바탕으로:
  - 내용 가이드: {user_guidance}
  - 소설 구조:
  {novel_architecture}

  총 {number_of_chapters}장의 리듬이 필요합니다.

  지금까지 만든 장 목록(비어 있으면 처음부터):

  {chapter_list}

  이제 제{n}장부터 제{m}장까지 설계하세요.

  1. 장 묶음:
  - 3~5장마다 하나의 서스펜스 유닛, 소클라이맥스 포함
  - 유닛 사이에는 긴장 2장 → 완충 1장
  - 큰 전환 장에는 다시점 복선 여유를 둘 것

  2. 각 장에 적을 것:
  - 이번 장 역할(인물/사건/주제 등)
  - 서스펜스 유형(정보 비대칭/도덕 딜레마/시간 압박 등)
  - 감정 톤 이동(예: 의심→공포→결단)
  - 복선(매설/강화/회수)
  - 반전 강도(1~5단계)

  출력 형식 예시:
  제n장 - [제목]
  이번 장 역할: [인물/사건/주제/...]
  핵심 기능: [추진/전환/폭로/...]
  서스펜스: [촘촘/점진/폭발/...]
  복선: 매설(A실마리)→강화(B모순)...
  반전: ★☆☆☆☆
  장 요약: [한 문장]

  제n+1장 - [제목]
  이번 장 역할: [인물/사건/주제/...]
  핵심 기능: [추진/전환/폭로/...]
  서스펜스: [촘촘/점진/폭발/...]
  복선: 매설(A실마리)→강화(B모순)...
  반전: ★☆☆☆☆
  장 요약: [한 문장]

  요구:
  - 장당 설명은 100자 이내로 짧게
  - 긴장 곡선이 전체에서 자연스럽게 이어지게
  - {number_of_chapters}장을 다 쓰기 전에는 결말 장을 넣지 말 것

  결과 텍스트만 주세요. 설명은 붙이지 마세요.
summary_prompt: |
  새로 완성된 장:
  {chapter_text}

  지금까지의 이전 내용 요약(비어 있을 수 있음):
  {global_summary}

  이번 장 내용을 반영해 이전 내용 요약을 갱신하세요.
  요구:
  - 중요한 옛 정보는 남기고 새 플롯 요점을 합칠 것
  - 간결하게 전체 진행을 서술
  - 사실에 가깝게 쓰고, 해석·연상은 넣지 말 것
  - 2000자 이내

  이전 내용 요약만 반환하세요. 설명은 붙이지 마세요.
create_character_state_prompt: |
  인물 역학 설정: {character_dynamics}

  인물 상태 문서를 만드세요. 형식 예:

  김철수:
  ├──물품:
  │  ├──청색 도포: 헐거운 푸른 장포, 암홍색 얼룩이 있음
  │  └──한철 장검: 부러진 철검, 검신에 옛 부적이 새겨져 있음
  ├──능력
  │  ├──스킬1: 강한 정신 감지: 주변 인물의 내면 활동을 감지할 수 있음
  │  └──스킬2: 무형 공격: 눈에 보이지 않는 정신 공격을 방출할 수 있음
  ├──상태
  │  ├──신체 상태: 체격이 단정하고 화려한 갑옷을 입었으며 표정은 싸늘함
  │  └──심리 상태: 겉으로는 평온하나, 마을 앞날을 장악하려는 야심과 불안이 있음
  ├──주요 인물 관계망
  │  ├──이영희: 어려서부터 인연이 있으며 그녀의 성장을 지켜봐 왔음
  │  └──박민수: 복잡한 과거가 있으며, 최근 충돌로 상대가 위협을 느낌
  ├──촉발 또는 심화된 사건
  │  ├──마을에 정체 모를 기호 출현: 큰일이 임박했음을 암시
  │  └──이영희가 피부에 자상을 입음: 서로의 실력을 깨달은 뒤 재빨리 자리를 떠남

  인물명:
  ├──물품:
  │  ├──어떤 물건(소품): 설명
  │  └──XX 장검(무기): 설명
  │   ...
  ├──능력
  │  ├──스킬1: 설명
  │  └──스킬2: 설명
  │   ...
  ├──상태
  │  ├──신체 상태:
  │  └──심리 상태: 설명
  │
  ├──주요 인물 관계망
  │  ├──이영희: 설명
  │  └──박민수: 설명
  │   ...
  ├──촉발 또는 심화된 사건
  │  ├──사건1: 설명
  │  └──사건2: 설명
      ...

  신규 등장 인물:
  - (앞으로 추가되거나 잠깐 등장하는 인물의 기본 정보)

  인물 상태 텍스트만 반환하세요. 설명은 붙이지 마세요.
update_character_state_prompt: |
  새로 완성된 장:
  {chapter_text}

  현재 인물 상태 문서:
  {old_state}

  주요 인물 상태를 갱신하세요. 형식 예:

  김철수:
  ├──물품:
  │  ├──청색 도포: 헐거운 푸른 장포, 암홍색 얼룩이 있음
  │  └──한철 장검: 부러진 철검, 검신에 옛 부적이 새겨져 있음
  ├──능력
  │  ├──스킬1: 강한 정신 감지: 주변 인물의 내면 활동을 감지할 수 있음
  │  └──스킬2: 무형 공격: 눈에 보이지 않는 정신 공격을 방출할 수 있음
  ├──상태
  │  ├──신체 상태: 체격이 단정하고 화려한 갑옷을 입었으며 표정은 싸늘함
  │  └──심리 상태: 겉으로는 평온하나, 마을 앞날을 장악하려는 야심과 불안이 있음
  ├──주요 인물 관계망
  │  ├──이영희: 어려서부터 인연이 있으며 그녀의 성장을 지켜봐 왔음
  │  └──박민수: 복잡한 과거가 있으며, 최근 충돌로 상대가 위협을 느낌
  ├──촉발 또는 심화된 사건
  │  ├──마을에 정체 모를 기호 출현: 큰일이 임박했음을 암시
  │  └──이영희가 피부에 자상을 입음: 서로의 실력을 깨달은 뒤 재빨리 자리를 떠남

  인물명:
  ├──물품:
  │  ├──어떤 물건(소품): 설명
  │  └──XX 장검(무기): 설명
  │   ...
  ├──능력
  │  ├──스킬1: 설명
  │  └──스킬2: 설명
  │   ...
  ├──상태
  │  ├──신체 상태:
  │  └──심리 상태: 설명
  │
  ├──주요 인물 관계망
  │  ├──이영희: 설명
  │  └──박민수: 설명
  │   ...
  ├──촉발 또는 심화된 사건
  │  ├──사건1: 설명
  │  └──사건2: 설명
      ...

  ......

  신규 등장 인물:
  - 새로 나오거나 잠깐 등장한 인물만 짧게. 시야에서 사라진 인물은 지워도 됨.

  요구:
  - 기존 문서를 바탕으로 가감만 할 것
  - 구조는 유지하고, 문장은 짧게

  갱신된 인물 상태만 반환하세요. 설명은 붙이지 마세요.
first_chapter_draft_prompt: |
  곧 집필: 제 {novel_number} 장 《{chapter_title}》
  이번 장 역할: {chapter_role}
  핵심 기능: {chapter_purpose}
  서스펜스: {suspense_level}
  복선: {foreshadowing}
  반전: {plot_twist_level}
  장 요약: {chapter_summary}

  사용 가능 요소:
  - 주요 인물(없을 수 있음): {characters_involved}
  - 주요 소품(없을 수 있음): {key_items}
  - 장면 장소(없을 수 있음): {scene_location}
  - 시간 압박(없을 수 있음): {time_constraint}

  참고 문서:
  - 소설 설정:
  {novel_setting}

  제 {novel_number} 장 본문을 쓰세요. 분량 {word_number}자.
  아래 유형 중 긴장감 있는 장면을 최소 2개 넣으세요.

  1. 대화:
     - 말과 속뜻이 어긋나는 충돌
     - 권력 관계가 말투·말 길이로 드러남

  2. 액션:
     - 환경과 몸이 부딪히는 감각 묘사(최소 3개)
     - 짧은 문장으로 가속하고, 필요할 때만 늦추기
     - 행동으로 인물 특성을 드러내기

  3. 심리:
     - 말과 행동이 어긋나는 순간
     - 세계관의 기호·이미지를 빌려 쓰기
     - 결정 직전, 무엇을 택할지 저울질하는 장면

  4. 환경:
     - 시점을 넓게→좁게→이상한 초점으로 옮기기
     - 감각을 비틀어 쓰는 표현을 허용하되, 남발하지 말 것(예: "햇빛의 무게를 듣다")
     - 환경이 인물 심리를 비추게

  형식:
  - 본문만 반환
  - 장 안 소제목 금지
  - markdown 금지

  추가 가이드(없을 수 있음): {user_guidance}
next_chapter_draft_prompt: |
  참고 문서:
  └── 이전 내용 요약:
      {global_summary}

  └── 이전 장 결말 단락:
      {previous_chapter_excerpt}

  └── 사용자 가이드:
      {user_guidance}

  └── 인물 상태:
      {character_state}

  └── 현재 장 요약:
      {short_summary}

  현재 장 정보:
  제{novel_number}장 《{chapter_title}》:
  ├── 이번 장 역할: {chapter_role}
  ├── 핵심 기능: {chapter_purpose}
  ├── 서스펜스: {suspense_level}
  ├── 복선: {foreshadowing}
  ├── 반전: {plot_twist_level}
  ├── 장 요약: {chapter_summary}
  ├── 글자 수: {word_number}자
  ├── 주요 인물: {characters_involved}
  ├── 주요 소품: {key_items}
  ├── 장면 장소: {scene_location}
  └── 시간 압박: {time_constraint}

  다음 장:
  제{next_chapter_number}장 《{next_chapter_title}》:
  ├── 이번 장 역할: {next_chapter_role}
  ├── 핵심 기능: {next_chapter_purpose}
  ├── 서스펜스: {next_chapter_suspense_level}
  ├── 복선: {next_chapter_foreshadowing}
  ├── 반전: {next_chapter_plot_twist_level}
  └── 장 요약: {next_chapter_summary}

  지식 베이스 참고(중요도 순):
  {filtered_context}

  지식 베이스 적용:
  1. 내용 등급:
     - 작법(우선): 장면 짜기, 대화, 서스펜스 기법
     - 설정(선택): 아직 안 쓴 세계관·기술 디테일
     - 피할 것: 이미 나온 특정 플롯, 같은 관계 진전 반복

  2. 사용 제한:
     - 이전 장 플롯 패턴을 그대로 복제하지 말 것
     - 이전 장은 리듬 참고용으로만, 장면 골격은 새로
     - 필요한 인물 반응만 이어 받고, 표현은 충분히 바꿀 것
     - 외부 작법 지식은 장면력·서스펜스에 우선 쓰기

  3. 중복이 느껴지면:
     - 심하면 서사 각도를 다시 잡을 것
     - 중간이면 핵심 요소를 여럿 교체할 것
     - 약하면 개념은 유지하되 표현만 바꿀 것

  위 설정을 근거로 제 {novel_number} 장 본문을 쓰세요. 분량 {word_number}자.
  반드시 따를 것:
  - 사용자 가이드
  - 현재 장 요약
  - 현재 장 정보
  - 논리 구멍 없이, 이전 요약·이전 장 결말과 자연스럽게 이어지고, 다음 장과도 어긋나지 않게

  형식:
  - 본문만 반환
  - 장 안 소제목 금지
  - markdown 금지
Character_Import_Prompt: |
  아래 텍스트에서 인물과 속성을 뽑으세요. 형식을 지켜 주세요.

  <<인물 상태 형식>>
  1. 다음 다섯 칸을 이 순서로:
     ● 물품 ● 능력 ● 상태 ● 주요 인물 관계망 ● 촉발 또는 심화된 사건
  2. 각 항목은 【이름: 설명】 형식
     예: ├──청색 도포: 헐거운 푸른 장포, 암홍색 얼룩이 있음
  3. 상태에는 반드시:
     ● 신체 상태: [현재 몸 상태]
     ● 심리 상태: [현재 심리]
  4. 관계망:
     ● [인물명]: [관계, 예: "경쟁자"/"동맹"]
  5. 촉발 사건:
     ● [사건명]: [짧은 설명과 영향]

  <<예시>>
  이원외:
  ├──물품:
  │  ├──청색 도포: 헐거운 푸른 장포, 암홍색 얼룩이 있음
  │  └──한철 장검: 검신에 균열이 있고 「청운」 부적이 새겨져 있음
  ├──능력:
  │  ├──정신 감지: 반경 30m 안 생명체를 감지
  │  └──검기 제압: 시선으로 정신 위압을 방출
  ├──상태:
  │  ├──신체 상태: 오른팔에 아물지 않은 도상
  │  └──심리 상태: 소명원의 실력을 경계함
  ├──주요 인물 관계망:
  │  ├──소명원: 경쟁자, 10년 전 동료
  │  └──임완아: 몰래 키우는 후계자
  ├──촉발 또는 심화된 사건:
  │  ├──병기고 피습: 가보 보검 3자루 분실, 전력에 영향
  │  └──익명의 협박 편지: 편지에 백단 향기가 남아 내부 유출을 암시
  │

  위 형식으로 아래 내용을 분석하세요.
  <<분석할 소설 텍스트 시작>>
  {content}
  <<분석할 소설 텍스트 끝>>
enrich_prompt: |
  아래 장 텍스트가 짧습니다. 플롯 흐름은 유지한 채 살을 붙여 약 {word_number}자에 맞추세요. 본문만 주세요. 설명은 붙이지 마세요.
  원문:
  {chapter_text}
CONSISTENCY_PROMPT: |
  아래 설정과 최신 장 사이에 명백한 충돌·불일치가 있으면 나열하세요.
  - 소설 설정:
  {novel_setting}

  - 인물 상태:
  {character_state}

  - 이전 내용 요약:
  {global_summary}

  - 기록된 미해결 충돌·플롯 요점:
  {plot_arcs}

  - 최신 장 내용:
  {chapter_text}

  충돌·불일치가 있으면 설명하세요. 미해결 줄기 중 무시되었거나 진전이 필요한 것도 함께 적으세요. 없으면 "명백한 충돌 없음"만 반환하세요.
